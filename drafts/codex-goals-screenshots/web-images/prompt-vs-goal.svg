<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="promptGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="800" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="1">PROMPTS vs GOALS</text>
  <text x="800" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#888899">Two ways to work with AI agents</text>

  <!-- Divider line -->
  <line x1="800" y1="130" x2="800" y2="860" stroke="#333355" stroke-width="1" stroke-dasharray="8,8"/>

  <!-- LEFT SIDE: Prompts -->
  <rect x="40" y="130" width="720" height="730" rx="16" fill="url(#promptGrad)" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ff6b6b">PROMPT-BASED</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ff6b6b" opacity="0.7">Turn-based: you're the bottleneck</text>

  <!-- Prompt flow boxes -->
  <rect x="140" y="240" width="260" height="56" rx="10" fill="#1e1e35" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="180" y="265" font-family="system-ui, sans-serif" font-size="14" fill="#ff8888">👤 YOU</text>
  <text x="180" y="284" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">"Rewrite this function"</text>

  <line x1="270" y1="296" x2="270" y2="326" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <polygon points="265,326 275,326 270,336" fill="#ff6b6b"/>

  <rect x="140" y="340" width="260" height="56" rx="10" fill="#1e1e35" stroke="#555577" stroke-width="1.5"/>
  <text x="180" y="365" font-family="system-ui, sans-serif" font-size="14" fill="#aaaacc">🤖 AI</text>
  <text x="180" y="384" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">Rewrites function. Waits.</text>

  <polygon points="265,396 275,396 270,426" fill="#ff6b6b"/>

  <rect x="140" y="430" width="260" height="56" rx="10" fill="#1e1e35" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="180" y="455" font-family="system-ui, sans-serif" font-size="14" fill="#ff8888">👤 YOU</text>
  <text x="180" y="474" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">"Ok, what's next?"</text>

  <polygon points="265,486 275,486 270,516" fill="#ff6b6b"/>

  <rect x="140" y="520" width="260" height="56" rx="10" fill="#1e1e35" stroke="#555577" stroke-width="1.5"/>
  <text x="180" y="545" font-family="system-ui, sans-serif" font-size="14" fill="#aaaacc">🤖 AI</text>
  <text x="180" y="564" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">Suggests next step. Waits.</text>

  <polygon points="265,576 275,576 270,606" fill="#ff6b6b"/>

  <rect x="140" y="610" width="260" height="56" rx="10" fill="#1e1e35" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="180" y="635" font-family="system-ui, sans-serif" font-size="14" fill="#ff8888">👤 YOU</text>
  <text x="180" y="654" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">"Do it."</text>

  <polygon points="265,666 275,666 270,696" fill="#ff6b6b"/>

  <text x="270" y="720" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#ff6b6b" opacity="0.6">∞ repeat until done...</text>

  <!-- Prompt stats -->
  <rect x="450" y="350" width="280" height="180" rx="12" fill="#1a1a30" stroke="#444466" stroke-width="1"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ff8888">The Problem</text>
  <text x="475" y="415" font-family="system-ui, sans-serif" font-size="14" fill="#999999">⏱ Requires constant attention</text>
  <text x="475" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#999999">🛑 Work stops when you leave</text>
  <text x="475" y="465" font-family="system-ui, sans-serif" font-size="14" fill="#999999">🔄 You manage every step</text>
  <text x="475" y="490" font-family="system-ui, sans-serif" font-size="14" fill="#999999">📉 Doesn't scale with complexity</text>

  <!-- RIGHT SIDE: Goals -->
  <rect x="840" y="130" width="720" height="730" rx="16" fill="url(#goalGrad)" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1200" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#4ecdc4">GOAL-BASED</text>
  <text x="1200" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#4ecdc4" opacity="0.7">Outcome-driven: AI drives toward done</text>

  <!-- Goal: Define -->
  <rect x="1020" y="240" width="280" height="70" rx="10" fill="#1e1e35" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="1060" y="268" font-family="system-ui, sans-serif" font-size="14" fill="#4ecdc4">👤 YOU (once)</text>
  <text x="1060" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">"P95 latency below 200ms.</text>

  <polygon points="1155,310 1165,310 1160,340" fill="#4ecdc4"/>

  <!-- Goal loop: Execute -->
  <rect x="1020" y="345" width="280" height="50" rx="10" fill="#1e1e35" stroke="#555577" stroke-width="1.5"/>
  <text x="1060" y="377" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">🤖 Execute changes</text>

  <polygon points="1155,395 1165,395 1160,420" fill="#4ecdc4"/>

  <!-- Goal loop: Verify -->
  <rect x="1020" y="425" width="280" height="50" rx="10" fill="#1e1e35" stroke="#555577" stroke-width="1.5"/>
  <text x="1060" y="457" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">🔍 Verify against criteria</text>

  <polygon points="1155,475 1165,475 1160,500" fill="#4ecdc4"/>

  <!-- Goal loop: Decide -->
  <rect x="1020" y="505" width="280" height="50" rx="10" fill="#1e1e35" stroke="#555577" stroke-width="1.5"/>
  <text x="1060" y="537" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">🧠 Decide next step</text>

  <!-- Loop arrow back to Execute -->
  <path d="M 1310 530 Q 1370 530 1370 370 Q 1370 345 1300 345" fill="none" stroke="#4ecdc4" stroke-width="2"/>
  <polygon points="1305,340 1305,350 1295,345" fill="#4ecdc4"/>
  <text x="1385" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#4ecdc4" opacity="0.7" transform="rotate(90, 1385, 440)">LOOP</text>

  <!-- Goal: Done -->
  <polygon points="1155,555 1165,555 1160,580" fill="#4ecdc4"/>

  <rect x="1060" y="585" width="200" height="50" rx="25" fill="#4ecdc4" fill-opacity="0.2" stroke="#4ecdc4" stroke-width="2"/>
  <text x="1160" y="616" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#4ecdc4">✅ Goal Met</text>

  <polygon points="1155,635 1165,635 1160,660" fill="#4ecdc4"/>

  <!-- Goal: Review -->
  <rect x="1020" y="665" width="280" height="50" rx="10" fill="#1e1e35" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="1060" y="697" font-family="system-ui, sans-serif" font-size="15" fill="#ffffff">👤 Review final result</text>

  <!-- Goal stats -->
  <rect x="870" y="350" width="120" height="180" rx="12" fill="#1a1a30" stroke="#444466" stroke-width="1"/>
  <text x="930" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ecdc4">Result</text>
  <text x="930" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#4ecdc4">2×</text>
  <text x="930" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888899">attention</text>
  <text x="930" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888899">needed</text>
  <text x="930" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888899">define +</text>
  <text x="930" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888899">review</text>

  <!-- Bottom comparison -->
  <rect x="100" y="770" width="280" height="70" rx="10" fill="#ff6b6b" fill-opacity="0.1" stroke="#ff6b6b" stroke-width="1"/>
  <text x="240" y="800" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ff8888">Dozens of prompts</text>
  <text x="240" y="822" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888899">Hours of supervision</text>

  <text x="800" y="810" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#555577">vs</text>

  <rect x="1060" y="770" width="280" height="70" rx="10" fill="#4ecdc4" fill-opacity="0.1" stroke="#4ecdc4" stroke-width="1"/>
  <text x="1200" y="800" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#4ecdc4">One goal</text>
  <text x="1200" y="822" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888899">Walk away for 6 hours</text>
</svg>
